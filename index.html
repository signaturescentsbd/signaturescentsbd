<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signature Scents BD | Home</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --dark: #111; --white: #fff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
        body { background: var(--white); color: var(--dark); overflow-x: hidden; }

        /* Navigation */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 8%; background: var(--white); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #eee; }
        .logo { font-size: 18px; font-weight: bold; letter-spacing: 3px; text-transform: uppercase; color: var(--dark); text-decoration: none; }
        .nav-links { display: flex; list-style: none; }
        .nav-links li { margin-left: 30px; }
        .nav-links a { text-decoration: none; color: var(--dark); font-size: 12px; text-transform: uppercase; font-weight: 600; transition: 0.3s; }
        .nav-links a:hover { color: var(--gold); }
        .hamburger { display: none; cursor: pointer; font-size: 24px; }

        /* Slider */
        .hero { position: relative; height: 75vh; overflow: hidden; }
        .slides { display: flex; width: 500%; height: 100%; animation: slide 20s infinite; }
        .slides img { width: 20%; height: 100%; object-fit: cover; }
        .hero-text { position: absolute; top: 50%; left: 8%; transform: translateY(-50%); z-index: 10; color: white; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
        .hero-text h1 { font-size: 55px; text-transform: uppercase; line-height: 1; margin-bottom: 20px; }

        @keyframes slide {
            0%, 15% { margin-left: 0; }
            20%, 35% { margin-left: -100%; }
            40%, 55% { margin-left: -200%; }
            60%, 75% { margin-left: -300%; }
            80%, 100% { margin-left: -400%; }
        }

        /* Products */
        .container { padding: 60px 8%; text-align: center; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 40px; margin-top: 40px; }
        .card { text-decoration: none; color: var(--dark); transition: 0.3s; border: 1px solid transparent; padding: 15px; }
        .card:hover { border-color: #eee; }
        .card img { width: 100%; height: 320px; object-fit: contain; background: #f9f9f9; margin-bottom: 15px; }
        .card h3 { font-size: 14px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .price { font-weight: bold; color: var(--gold); }

        @media (max-width: 768px) {
            .nav-links { position: fixed; right: -100%; top: 65px; background: white; width: 100%; height: 100vh; flex-direction: column; align-items: center; padding-top: 50px; transition: 0.4s; }
            .nav-links.active { right: 0; }
            .nav-links li { margin: 20px 0; }
            .hamburger { display: block; }
            .hero-text h1 { font-size: 35px; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="hamburger" onclick="toggle()"><i class="ri-menu-line"></i></div>
        <a href="index.html" class="logo">Signature Scents <span>BD</span></a>
        <ul class="nav-links" id="menu">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
        <div><i class="ri-search-line"></i></div>
    </nav>

    <section class="hero">
        <div class="hero-text">
            <h1>Premium <br>Collections</h1>
        </div>
        <div class="slides">
            <img src="https://images.unsplash.com/photo-1541604193435-225878996233?w=1200" alt="1">
            <img src="https://images.unsplash.com/photo-1594035910387-fea47794261f?w=1200" alt="2">
            <img src="https://images.unsplash.com/photo-1523293182086-7651a899d37f?w=1200" alt="3">
            <img src="https://images.unsplash.com/photo-1557170334-a9632e77c6e4?w=1200" alt="4">
            <img src="https://images.unsplash.com/photo-1592945403244-b3fbafd7f539?w=1200" alt="5">
        </div>
    </section>

    <div class="container">
        <h2>SHOP ALL</h2>
        <div class="product-grid">
            <a href="product-details.html" class="card">
                <img src="https://images.unsplash.com/photo-1594035910387-fea47794261f?w=500" alt="Eros">
                <h3>Versace Eros Flame</h3>
                <p class="price">৳450.00</p>
            </a>
            </div>
    </div>

    <script>
        function toggle() { document.getElementById("menu").classList.toggle("active"); }
    </script>
</body>
</html>
